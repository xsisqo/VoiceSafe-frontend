<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoiceSafe Case</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-3xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6">VoiceSafe Result</h1>

<div class="bg-white shadow rounded-xl p-6 space-y-4">

<div>
<span class="font-semibold">Risk level:</span>
<span id="riskLevel">Loading...</span>
</div>

<div>
<span class="font-semibold">Confidence:</span>
<span id="confidence"></span>
</div>

<div>
<span class="font-semibold">Summary:</span>
<div id="summary"></div>
</div>

</div>

</div>

<script>

async function loadCase(){

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("riskLevel").textContent = "Invalid case id";
return;
}

const r = await fetch(
"https://voicesafe-backend-1.onrender.com/case/" + id,
{
headers:{
"x-api-key":"voicesafe-public"
}
}
);

const data = await r.json();

document.getElementById("riskLevel").textContent = data.level;
document.getElementById("confidence").textContent = data.confidence;
document.getElementById("summary").textContent = data.summary;

}

loadCase();

</script>

</body>
</html>
