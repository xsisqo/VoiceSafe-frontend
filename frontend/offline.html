<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VoiceSafe — Offline</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b1220;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100%;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 24px;
      padding: 28px;
      box-sizing: border-box;
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: rgba(255,255,255,0.75);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>VoiceSafe is offline</h1>
      <p>Your connection is currently unavailable. Reconnect to continue analyzing voice recordings and using live services.</p>
    </div>
  </div>
</body>
</html>
